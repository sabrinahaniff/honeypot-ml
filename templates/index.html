<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeypot Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; font-size: 24px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; text-align: center; }
        .stat-card h2 { font-size: 36px; color: #58a6ff; }
        .stat-card p { color: #8b949e; font-size: 14px; margin-top: 5px; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .chart-card h3 { color: #58a6ff; margin-bottom: 15px; }
        .table-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .table-card h3 { color: #58a6ff; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; color: #8b949e; border-bottom: 1px solid #30363d; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #21262d; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        .bot-tag { background: #da3633; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .human-tag { background: #238636; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .refresh { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1> Honeypot Attack Dashboard</h1>
    <button class="refresh" onclick="loadData()">Refresh</button>

    <div class="stats">
        <div class="stat-card"><h2 id="total">-</h2><p>Total Attacks</p></div>
        <div class="stat-card"><h2 id="bots">-</h2><p>Bots Detected</p></div>
        <div class="stat-card"><h2 id="humans">-</h2><p>Human Attackers</p></div>
        <div class="stat-card"><h2 id="ips">-</h2><p>Unique IPs</p></div>
    </div>

    <div class="charts">
        <div class="chart-card">
            <h3>Bot vs Human</h3>
            <canvas id="botChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Top Usernames Tried</h3>
            <canvas id="usernameChart"></canvas>
        </div>
    </div>

    <div class="table-card">
        <h3>Recent Attacks</h3>
        <table>
            <thead><tr><th>Time</th><th>IP</th><th>Username</th><th>Password</th><th>Type</th></tr></thead>
            <tbody id="attackTable"></tbody>
        </table>
    </div>

    <script>
        let botChart, usernameChart;

        async function loadData() {
            const [statsRes, attacksRes] = await Promise.all([
                fetch('/api/stats'),
                fetch('/api/attacks')
            ]);
            const stats = await statsRes.json();
            const attacks = await attacksRes.json();

            document.getElementById('total').textContent = stats.total || 0;
            document.getElementById('bots').textContent = stats.bots || 0;
            document.getElementById('humans').textContent = stats.humans || 0;
            document.getElementById('ips').textContent = stats.unique_ips || 0;

            // bot vs human chart
            if (botChart) botChart.destroy();
            botChart = new Chart(document.getElementById('botChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Bots', 'Humans'],
                    datasets: [{ data: [stats.bots || 0, stats.humans || 0], backgroundColor: ['#da3633', '#238636'] }]
                },
                options: { plugins: { legend: { labels: { color: '#e6edf3' } } } }
            });

            // username chart
            if (usernameChart) usernameChart.destroy();
            const usernames = (stats.top_usernames || []).map(u => u[0]);
            const counts = (stats.top_usernames || []).map(u => u[1]);
            usernameChart = new Chart(document.getElementById('usernameChart'), {
                type: 'bar',
                data: {
                    labels: usernames,
                    datasets: [{ label: 'Attempts', data: counts, backgroundColor: '#58a6ff' }]
                },
                options: {
                    plugins: { legend: { labels: { color: '#e6edf3' } } },
                    scales: { x: { ticks: { color: '#8b949e' } }, y: { ticks: { color: '#8b949e' } } }
                }
            });

            // attack table
            const tbody = document.getElementById('attackTable');
            tbody.innerHTML = '';
            attacks.slice(-20).reverse().forEach(a => {
                const isBot = a.is_common_username && a.is_common_password;
                const time = new Date(a.timestamp).toLocaleTimeString();
                tbody.innerHTML += `<tr>
                    <td>${time}</td>
                    <td>${a.ip}</td>
                    <td>${a.username}</td>
                    <td>${a.password}</td>
                    <td><span class="${isBot ? 'bot-tag' : 'human-tag'}">${isBot ? 'BOT' : 'HUMAN'}</span></td>
                </tr>`;
            });
        }

        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
